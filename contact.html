<!DOCTYPE html>
<html>

<head>
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="section-one">
            <h1 class="section-one__name"> Anitha</h1>
            <p class="section-one__role">Full Stack Developer</p>
            <a class="section-one__contact" href="index.html">Home</a>
        </div>
        <div class="contact-form">
            <form>
                <table>
                    <tr>
                        <td> Name:</td>
                        <td><input type="text" placeholder="Enter your name"class="contact-form__input"></td>

                    </tr>
                    <tr>
                        <td> Email:</td>
                        <td><input type="email" placeholder="Enter your email" class="contact-form__input"></td>
                    </tr>
                    <tr>
                        <td> Message:</td>
                        <td><textarea rows="4" cols="30" placeholder="Enter your message" class="contact-form__textarea"></textarea></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="submit" value="Submit" class="contact-form__submit"></td>
                    </tr>
                </table>
            </form>
        </div>
        <div class="section-five">
            <p class="section-five__title"> Social Media Links:
                <a href="https://www.linkedin.com/in/anitha-s-442072318" target="_blank">LinkedIn</a>
                <a href="https://github.com/anithas" target="_blank">GitHub</a>
            </p>
            <p class="section-five__desc">&copy; Anitha. .</p>
        </div>
    </div>
</body>

</html>
